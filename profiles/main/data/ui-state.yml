  cross-cutting concerns, many searches/edits, or architectural
  changes.\",\"name\":\"high\"}]},{\"description\":\"What the user is trying to
  accomplish\",\"name\":\"intent_types\",\"values\":[{\"description\":\"The user
  is planning a feature or approach before implementation.\",\"examples\":[\"How
  should I architect this?\",\"What's the best approach?\",\"Let's plan the
  implementation\"],\"name\":\"Plan\"},{\"description\":\"The user is seeking to
  understand the codebase or asking questions.\",\"examples\":[\"How does this
  work?\",\"Where is authentication implemented?\",\"Explain this
