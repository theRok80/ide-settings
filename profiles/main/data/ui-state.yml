  visualizations.\",\"examples\":[\"Create a chart from this data\",\"Visualize
  the trends\",\"Make a dashboard\"],\"name\":\"Data
  Visualization\"}]},{\"description\":\"How complex the task is to
  complete\",\"name\":\"complexity_levels\",\"values\":[{\"description\":\"Very
  simple task requiring a single line or obvious
  change.\",\"name\":\"trivial\"},{\"description\":\"Simple task affecting 1-2
  files with minimal code
  changes.\",\"name\":\"low\"},{\"description\":\"Moderate difficulty, touching
