  tasks like git, lint, or build.\",\"examples\":[\"Commit these changes\",\"Run
  the linter\",\"Create a PR\"],\"name\":\"Task
  Automation\"},{\"description\":\"The user is asking to write code and make
  actual changes.\",\"examples\":[\"Implement this feature\",\"Add the
  endpoint\",\"Build the component\"],\"name\":\"Write
  Code\"}]},{\"description\":\"Domain focus areas within the task (use
  sparingly)\",\"name\":\"subcategories\",\"values\":[{\"description\":\"System
  design, patterns, structure, or component
  boundaries.\",\"name\":\"Architecture\"},{\"description\":\"Auth, permissions,
  vulnerabilities, sanitization, secrets
  handling.\",\"name\":\"Security\"},{\"description\":\"DB queries, schemas,
  migrations, data
  modeling.\",\"name\":\"Data/Database\"},{\"description\":\"CI/CD, deployment,
  infra-as-code, runtime config at
  deploy.\",\"name\":\"DevOps/Deployment\"},{\"description\":\"Visual design,
  layout, CSS, and UI
  behavior.\",\"name\":\"UI/Styling\"},{\"description\":\"Integrating with
  external APIs/SDKs, webhooks, clients.\",\"name\":\"API
  Integration\"},{\"description\":\"Latency, throughput, memory, or efficiency
  improvements.\",\"name\":\"Performance\"},{\"description\":\"Tests, harnesses,
  flakes, coverage work.\",\"name\":\"Testing\"},{\"description\":\"Docs,
  READMEs, comments, API
  documentation.\",\"name\":\"Documentation\"},{\"description\":\"Tooling/build
  config, env setup, lint/format, project
  config.\",\"name\":\"Configuration\"},{\"description\":\"Reviewing code for
  correctness/quality.\",\"name\":\"Code
  Review\"},{\"description\":\"Learning/explaining concepts or
  technologies.\",\"name\":\"Learning\"}]},{\"description\":\"How much guidance
  and specificity the user provides in their request (measures user's upfront
  cognitive work, not task
  difficulty)\",\"name\":\"user_guidance_levels\",\"values\":[{\"description\":\
  \"User provides highly specific, disciplined requests with clear context.
  Mentions specific files, functions, or line numbers. Includes acceptance
  criteria or expected behavior. Shows deep understanding of the codebase. Low
  ambiguity - the agent knows exactly what to do.\",\"examples\":[\"Add retry
  logic to fetchData() in src/api/client.ts with exponential backoff, max 3
  retries, starting at 100ms\",\"The useAuth hook in hooks/auth.ts is causing a
  re-render loop on line 45 because the dependency array includes the entire
  user object instead of user.id\",\"Refactor the PaymentService class to use
  the Strategy pattern - extract the payment processing logic into separate
  classes for Stripe, PayPal, and Apple
  Pay\"],\"name\":\"high\"},{\"description\":\"User provides general direction
  with some specifics but leaves implementation details to the agent. May
  reference general areas of the codebase. Some ambiguity in
  approach.\",\"examples\":[\"Add error handling to the API calls\",\"The
  authentication is broken, I think it's something with the token
  refresh\",\"Make the dashboard load faster\",\"Add validation to the form
  inputs\"],\"name\":\"medium\"},{\"description\":\"User provides vague,
  reactive, or minimal-effort requests. Error-paste-fix patterns. 'Fix this'
  without context. QA-style feedback that puts all cognitive work on the agent.
  High ambiguity.\",\"examples\":[\"Fix this\",\"It's not working\",\"That's
  wrong, try again\",\"There's an error\",\"[pasted error stack trace with no
  context]\",\"Make it work\",\"This is
  broken\"],\"name\":\"low\"}]}],\"outputFields\":[{\"categoryRef\":\"task_cate\
  gories\",\"description\":\"Primary task categories (pick 0-2 that best
  apply)\",\"maxItems\":2,\"name\":\"categories\",\"type\":\"array\"},{\"catego\
  ryRef\":\"complexity_levels\",\"description\":\"Task complexity level - how
  difficult is the task itself (pick exactly
  one)\",\"name\":\"complexity\",\"type\":\"single\"},{\"categoryRef\":\"intent\
  _types\",\"description\":\"User's primary intent (pick exactly
  one)\",\"name\":\"intent\",\"type\":\"single\"},{\"categoryRef\":\"subcategor\
  ies\",\"description\":\"Specific focus areas (pick 0-2 that best
  apply)\",\"maxItems\":2,\"name\":\"subcategories\",\"type\":\"array\"},{\"cat\
  egoryRef\":\"user_guidance_levels\",\"description\":\"How much
  guidance/specificity the user provides - measures user's upfront work, not
  task difficulty (pick exactly
  one)\",\"name\":\"userGuidanceLevel\",\"type\":\"single\"}],\"systemPrompt\":\
  \"You are given a conversation between a user and an AI coding assistant. Your
  task is to classify the conversation along the following five axes:\\n- The
  primary task category (what type of coding work is being done)\\n- The
  complexity of the task (how hard is it for the agent to complete)\\n- The
  user's intent (what they're trying to accomplish)\\n- The specific focus areas
  (subcategories)\\n- The user guidance level (how much direction/specificity
  the user provides)\\n\\nCarefully analyze the conversation content, paying
  attention to what the user is asking for and how the assistant
  responds.\\n\\nIMPORTANT - Complexity vs User Guidance Level:\\n- 'complexity'
  measures how difficult the TASK is for the agent (e.g., a large refactor is
  high complexity)\\n- 'userGuidanceLevel' measures how much GUIDANCE the user
  provides (e.g., \\\"fix this\\\" is low guidance, specific file/function
  references is high guidance)\\n- These are independent: a simple task can have
  low user guidance (\\\"fix the bug\\\") or high guidance (\\\"fix the null
  check on line 42 in utils.ts\\\")\\n- A complex task can have high guidance
  (detailed spec) or low guidance (vague requirements)\\n\\nOutput rules:\\n-
  For each output field, choose ONLY from the allowed values listed under that
  field. Do not invent new values.\\n- Use the value names exactly (case and
  spacing). Example: \\\"Write Code\\\" (not \\\"WriteCode\\\").\\n- Do not copy
  values across axes (e.g., do not use subcategory labels as categories, and do
  not use category labels as intent).\\n\\nImportant rules:\\n- Use 'Bug Fixing
